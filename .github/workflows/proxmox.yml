name: Proxmox Managed by Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/live/proxmox/**"
      - "modules/proxmox-vm/**"
      - ".github/workflows/proxmox.yml"

  pull_request:
    branches: [main]
    paths:
      - "infra/live/proxmox/**"
      - "modules/proxmox-vm/**"
      - ".github/workflows/proxmox.yml"

  workflow_dispatch:
    inputs:
      apply:
        description: "Executar terraform apply?"
        required: true
        type: boolean
        default: false

# Evita runs duplicados
concurrency:
  group: proxmox-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/live/proxmox
    steps:
      - uses: actions/checkout@v4

      - name: Test Proxmox connectivity
        run: |
          curl -k -s -o /dev/null -w "Proxmox API: HTTP %{http_code}\n" \
            --connect-timeout 10 \
            https://proxmox.artjason.com/api2/json/version

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      # - name: Configure AWS credentials (OIDC -> prod runner)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::713881824330:role/cicd-deployer-proxmox
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_proxmox_api_url: "https://proxmox.artjason.com/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_default_password: ${{ secrets.PROXMOX_VM_PASSWORD }}
        run: terraform plan -out=plan.out

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-proxmox-${{ github.sha }}
          path: infra/live/proxmox/plan.out

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    concurrency:
      group: proxmox-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/live/proxmox
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared version

      - name: Configure SSH for ProxyJump via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host ssh.artjason.com
            StrictHostKeyChecking no
            User jason
            ProxyCommand cloudflared access ssh --hostname %h

          Host 192.168.15.199
            StrictHostKeyChecking no
            User root
            ProxyJump jason@ssh.artjason.com
          EOF
          chmod 600 ~/.ssh/config

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Setup SSH agent (Proxmox host)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTION_SSH_PRIVATE_KEY }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-proxmox-${{ github.sha }}
          path: infra/live/proxmox

      - name: Terraform apply (from plan)
        env:
          TF_VAR_proxmox_api_url: "https://proxmox.artjason.com/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_ssh_host: "192.168.15.199"
        run: terraform apply -auto-approve plan.out
