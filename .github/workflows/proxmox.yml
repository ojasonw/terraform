name: Proxmox Managed by Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/live/proxmox/**"
      - "modules/proxmox-vm/**"
      - ".github/workflows/proxmox.yml"

  pull_request:
    branches: [main]
    paths:
      - "infra/live/proxmox/**"
      - "modules/proxmox-vm/**"
      - ".github/workflows/proxmox.yml"

  workflow_dispatch:
    inputs:
      apply:
        description: "Executar terraform apply?"
        required: true
        type: boolean
        default: false

# Evita runs duplicados
concurrency:
  group: proxmox-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/live/proxmox
    steps:
      - uses: actions/checkout@v4

      - name: Test Proxmox connectivity
        run: |
          curl -k -s -o /dev/null -w "Proxmox API: HTTP %{http_code}\n" \
            --connect-timeout 10 \
            https://proxmox.artjason.com/api2/json/version

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_proxmox_api_url: "https://proxmox.artjason.com/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_default_password: ${{ secrets.PROXMOX_VM_PASSWORD }}
        run: terraform plan -out=plan.out

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-proxmox-${{ github.sha }}
          path: infra/live/proxmox/plan.out

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.apply == true)
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    concurrency:
      group: proxmox-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/live/proxmox
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          cloudflared version

      - name: Authenticate to Cloudflare Access
        run: |
          mkdir -p ~/.cloudflared
          TOKEN=$(curl -s -D - -o /dev/null \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://ssh.artjason.com \
            | tr -d '\r' | grep CF_Authorization | sed 's/.*CF_Authorization=//;s/;.*//')
          echo "Token obtained: $([ -n "$TOKEN" ] && echo YES || echo NO)"
          if [ -z "$TOKEN" ]; then echo "ERROR: Failed to obtain CF Access token"; exit 1; fi
          # Extract AUD from JWT payload (second segment, base64url-decoded)
          AUD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('aud',''))" 2>/dev/null || true)
          echo "AUD tag: ${AUD:0:16}..."
          # Save token at all possible cloudflared cache paths
          echo "$TOKEN" > "$HOME/.cloudflared/ssh.artjason.com-${AUD}-token"
          TOKEN_MD5=$(echo -n "https://ssh.artjason.com" | md5sum | cut -d' ' -f1)
          echo "$TOKEN" > "$HOME/.cloudflared/${TOKEN_MD5}-token"
          echo "Cached at: ssh.artjason.com-<aud>-token and ${TOKEN_MD5}-token"
          ls -la ~/.cloudflared/

      - name: Configure SSH for ProxyJump via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' \
            'Host ssh.artjason.com' \
            '  StrictHostKeyChecking no' \
            '  User jason' \
            '  ProxyCommand cloudflared access ssh --hostname %h' \
            '' \
            'Host 192.168.15.199' \
            '  StrictHostKeyChecking no' \
            '  User root' \
            '  ProxyJump jason@ssh.artjason.com' >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Setup SSH agent (Proxmox host)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTION_SSH_PRIVATE_KEY }}

      - name: Test SSH via ProxyJump
        run: |
          echo "=== Token files ==="
          ls -la ~/.cloudflared/
          echo "=== Test websocket endpoint ==="
          curl -sv -o /dev/null \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            https://ssh.artjason.com/cdn-cgi/access/ssh-session 2>&1 | head -30 || true
          echo "=== cloudflared debug ==="
          timeout 5 cloudflared --loglevel debug access ssh --hostname ssh.artjason.com 2>&1 || true
          echo "=== SSH attempt ==="
          ssh -vvv -o ConnectTimeout=15 root@192.168.15.199 "echo 'SSH ProxyJump OK'"

      - name: Terraform init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-proxmox-${{ github.sha }}
          path: infra/live/proxmox

      - name: Terraform apply (from plan)
        env:
          TF_VAR_proxmox_api_url: "https://proxmox.artjason.com/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_proxmox_ssh_host: "192.168.15.199"
        run: terraform apply -auto-approve plan.out
