name: Proxmox Managed by Terraform

on:
  push:
    branches: [development]
    paths:
      - "infra/live/proxmox/**"
      - "modules/proxmox-vm/**"
      - ".github/workflows/proxmox.yml"

  pull_request:
    branches: [development]
    paths:
      - "infra/live/proxmox/**"
      - "modules/proxmox-vm/**"
      - ".github/workflows/proxmox.yml"

  workflow_dispatch:
    inputs:
      apply:
        description: "Executar terraform apply?"
        required: true
        type: boolean
        default: false

# Evita runs duplicados
concurrency:
  group: proxmox-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/live/proxmox
    steps:
      - uses: actions/checkout@v4

      # - name: Setup WireGuard
      #   env:
      #     WG0_CONF_B64: ${{ secrets.WG0_CONF_B64 }}
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y wireguard

      #     sudo install -m 0700 -d /etc/wireguard
      #     echo "$WG0_CONF_B64" | base64 -d >/dev/null 2>&1 || { echo "WG0_CONF_B64 inválido"; exit 1; }
      #     echo "$WG0_CONF_B64" | base64 -d | sudo sh -c 'cat > /etc/wireguard/wg0.conf' >/dev/null 2>&1
      #     sudo chmod 600 /etc/wireguard/wg0.conf

      #     sudo wg-quick up wg0

      #     echo "Testando conectividade com rede interna..."
      #     ping -c 3 100.64.5.199 || echo "Ping falhou, mas pode funcionar via API"

      - name: Test Proxmox connectivity
        run: |
          curl -k -s -o /dev/null -w "Proxmox API: HTTP %{http_code}\n" \
            --connect-timeout 10 \
            https://proxmox.artjason.com/api2/json/version

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      # - name: Configure AWS credentials (OIDC -> prod runner)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::713881824330:role/cicd-deployer-proxmox
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_proxmox_api_url: "https://proxmox.artjason.com/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_default_password: ${{ secrets.PROXMOX_VM_PASSWORD }}
        run: terraform plan -out=plan.out

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-proxmox-${{ github.sha }}
          path: infra/live/proxmox/plan.out

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'

    concurrency:
      group: proxmox-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: infra/live/proxmox
    steps:
      - uses: actions/checkout@v4

      # - name: Setup WireGuard
      #   env:
      #     WG0_CONF_B64: ${{ secrets.WG0_CONF_B64 }}
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y wireguard

      #     sudo install -m 0700 -d /etc/wireguard
      #     echo "$WG0_CONF_B64" | base64 -d >/dev/null 2>&1 || { echo "WG0_CONF_B64 inválido"; exit 1; }
      #     echo "$WG0_CONF_B64" | base64 -d | sudo sh -c 'cat > /etc/wireguard/wg0.conf' >/dev/null 2>&1
      #     sudo chmod 600 /etc/wireguard/wg0.conf

      #     sudo wg-quick up wg0

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      # - name: Configure AWS credentials (OIDC -> prod runner)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: arn:aws:iam::713881824330:role/cicd-deployer-proxmox
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tf-plan-proxmox-${{ github.sha }}
          path: infra/live/proxmox

      - name: Setup SSH agent (Proxmox host)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTION_SSH_PRIVATE_KEY }}

      - name: Terraform apply (from plan)
        env:
          TF_VAR_proxmox_api_url: "https://proxmox.artjason.com/"
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
        run: terraform apply -auto-approve plan.out
